<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cocktail Bar — Café Sativa</title>
  <meta name="description" content="A walnut-and-brass cocktail temple. Rare bottles, marble counters, warm pendants — Café Sativa's bar at the Tru Skool Mall.">

  <!-- ═══════════════════════════════════════════════════════
       SCRIPT LOAD ORDER (must match across all per-room scenes)

         1. A-Frame core (defines AFRAME, THREE)
         2. A-Frame Extras (movement-controls, etc.)
         3. gltf-extensions.js (Meshopt decoder — REQUIRED for
            optimized GLBs from tools/optimize-glbs.js to render)
         4. cs-room-props.js (catalog of placements)
         5. cs-room-boot.js (procedural room builder)
         6. cafe-sativa-props.js (provides the interactive tuner
            via ?prop-tune=<roomId>)
         7. Inline boot config

       Skipping step 3 = props render invisible.
       Skipping step 4 = no props loaded.
       Order matters: boot must run after props catalog is loaded.
       ═══════════════════════════════════════════════════════ -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
  <script src="js/gltf-extensions.js"></script>
  <script src="js/cs-room-props.js"></script>
  <script src="js/cs-room-boot.js"></script>
  <script src="js/cafe-sativa-props.js"></script>

  <link rel="stylesheet" href="css/ui.css">

  <style>
    /* Minimal HUD — back link + room title in top-left */
    #room-hud {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 100;
      color: #c9a84c;
      font-family: 'Cinzel', 'Georgia', serif;
      pointer-events: auto;
    }
    #room-hud .room-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }
    #room-hud .room-tagline {
      font-size: 13px;
      font-weight: 400;
      font-style: italic;
      opacity: 0.85;
      margin-top: 2px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }
    #room-hud .back-link {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 14px;
      background: rgba(10,10,15,0.8);
      border: 1px solid #c9a84c;
      border-radius: 4px;
      color: #c9a84c;
      text-decoration: none;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      transition: background 0.2s;
    }
    #room-hud .back-link:hover {
      background: rgba(201,168,76,0.2);
    }

    /* Loading veil — fades out when scene boots */
    #loading-veil {
      position: fixed;
      inset: 0;
      background: #0a0805;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #c9a84c;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: opacity 0.6s ease;
    }
    #loading-veil.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="loading-veil">Entering the bar…</div>

  <div id="room-hud">
    <div class="room-title">Cocktail Bar</div>
    <div class="room-tagline">Liquid Artistry, Reimagined</div>
    <a href="index.html" class="back-link">← Back to Mall</a>
  </div>

  <a-scene
    id="room-scene"
    renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true; toneMapping: ACESFilmic"
    background="color: #0a0805"
    cursor="rayOrigin: mouse"
    loading-screen="enabled: false"
    vr-mode-ui="enabled: false">
  </a-scene>

  <script>
    // ═══════════════════════════════════════════════════════════
    // ROOM CONFIG — change these values to make a new room
    //
    // To create cs-main-lounge.html, cs-cigar.html, etc:
    //   1. Copy this file, rename
    //   2. Update the <title>, hud title/tagline, loading veil
    //   3. Update the boot config below (id, name, dimensions, theme)
    //   4. Make sure js/cs-room-props.js has placements for that id
    //   5. Done — everything else is shared
    // ═══════════════════════════════════════════════════════════

    CSRoom.boot({
      id: 'bar',
      name: 'Cocktail Bar',
      tagline: 'Liquid Artistry, Reimagined',

      // Room dimensions (matches old wing layout: x=20..30, z=-37.5..-29.5)
      width: 10,
      depth: 8,
      height: 4.5,

      // Bar theme: walnut + brass + warm amber glow
      theme: {
        wall:    '#1a1410',  // dark walnut
        floor:   '#0f0a06',  // near-black aged wood
        ceiling: '#0a0805',  // smoky black
        accent:  '#c9a84c',  // brass gold
        ambient: '#3a2614',  // warm low ambient
      },
    });

    // Hide loading veil once the scene's loaded enough to render.
    document.querySelector('a-scene').addEventListener('loaded', () => {
      // Small extra delay so first-frame doesn't flash through
      setTimeout(() => {
        document.getElementById('loading-veil').classList.add('hidden');
      }, 800);
    });
  </script>
</body>
</html>
