<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Main Lounge — Café Sativa</title>
  <meta name="description" content="Where conversations find their rhythm. The Verse Alkemist sessions venue at Café Sativa — emerald, midnight blue, and gold.">

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
  <script src="js/gltf-extensions.js"></script>
  <script src="js/cs-room-props.js"></script>
  <script src="js/cs-room-boot.js"></script>
  <script src="js/cafe-sativa-props.js"></script>

  <link rel="stylesheet" href="css/ui.css">

  <style>
    #room-hud { position: fixed; top: 16px; left: 16px; z-index: 100;
      color: #d4af37; font-family: 'Cinzel', 'Georgia', serif; pointer-events: auto; }
    #room-hud .room-title { font-size: 22px; font-weight: 700; letter-spacing: 0.05em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6); }
    #room-hud .room-tagline { font-size: 13px; font-weight: 400; font-style: italic;
      opacity: 0.85; margin-top: 2px; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }
    #room-hud .back-link { display: inline-block; margin-top: 10px; padding: 6px 14px;
      background: rgba(10,10,15,0.8); border: 1px solid #d4af37; border-radius: 4px;
      color: #d4af37; text-decoration: none; font-family: system-ui, sans-serif;
      font-size: 13px; transition: background 0.2s; }
    #room-hud .back-link:hover { background: rgba(212,175,55,0.2); }
    #loading-veil { position: fixed; inset: 0; background: #050a14; z-index: 9999;
      display: flex; align-items: center; justify-content: center; color: #d4af37;
      font-family: system-ui, sans-serif; font-size: 14px; letter-spacing: 0.2em;
      text-transform: uppercase; transition: opacity 0.6s ease; }
    #loading-veil.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

  <div id="loading-veil">Entering the lounge…</div>

  <div id="room-hud">
    <div class="room-title">Main Lounge</div>
    <div class="room-tagline">Where Conversations Find Their Rhythm</div>
    <a href="index.html" class="back-link">← Back to Mall</a>
  </div>

  <a-scene
    id="room-scene"
    renderer="antialias: true; colorManagement: true"
    background="color: #0a1419"
    cursor="rayOrigin: mouse"
    loading-screen="enabled: false"
    vr-mode-ui="enabled: false">
  </a-scene>

  <script>
    CSRoom.boot({
      id: 'main-lounge',
      name: 'Main Lounge',
      tagline: 'Where Conversations Find Their Rhythm',

      // Largest indoor room — Verse Alkemist sessions need stage
      // + audience implied space + breathing room. Tall ceiling
      // for the jazz-club feel.
      width: 8,
      depth: 7,
      height: 4.0,

      // Jazz club palette: emerald deep + midnight blue + warm gold
      theme: {
        wall:    '#0a1419',   // midnight blue-green
        floor:   '#050a0d',   // near-black
        ceiling: '#03070a',   // deep midnight
        accent:  '#d4af37',   // warm gold (stage spot)
        ambient: '#0d2a1f',   // emerald ambient
      },
    });

    document.querySelector('a-scene').addEventListener('loaded', () => {
      setTimeout(() => {
        document.getElementById('loading-veil').classList.add('hidden');
      }, 800);
    });
  </script>
</body>
</html>
