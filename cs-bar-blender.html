<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cocktail Bar (Blender) — Café Sativa</title>
  <meta name="description" content="The cinematic Eight-Lounge-inspired bar — brass chandelier, Chesterfield seating, mirrored back-bar. Café Sativa at the Tru Skool Mall.">

  <!-- Script load order matters:
       1. A-Frame core (defines AFRAME, THREE)
       2. A-Frame Extras (movement-controls fallback)
       3. gltf-extensions.js (Meshopt decoder for optimized GLBs)
       4. mall-nav.js (registers tank-controls — MUST load before boot)
       5. cs-room-decor.js (composition primitives library)
       6. cs-room-props.js (Meshy/Blender prop catalog — 'bar-blender' entry)
       7. cs-room-boot.js (room builder + composition runner)
       8. cafe-sativa-props.js (interactive tuner support)
       9. Inline boot config -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
  <script src="js/gltf-extensions.js"></script>
  <script src="js/mall-nav.js"></script>
  <script src="js/cs-room-decor.js"></script>
  <script src="js/cs-room-props.js"></script>
  <script src="js/cs-room-boot.js"></script>
  <script src="js/cafe-sativa-props.js"></script>

  <link rel="stylesheet" href="css/ui.css">

  <style>
    #room-hud { position: fixed; top: 16px; left: 16px; z-index: 100;
      color: #c9a84c; font-family: 'Cinzel', 'Georgia', serif; pointer-events: auto; }
    #room-hud .room-title { font-size: 22px; font-weight: 700; letter-spacing: 0.05em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6); }
    #room-hud .room-tagline { font-size: 13px; font-weight: 400; font-style: italic;
      opacity: 0.85; margin-top: 2px; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }
    #room-hud .back-link { display: inline-block; margin-top: 10px; padding: 6px 14px;
      background: rgba(10,10,15,0.8); border: 1px solid #c9a84c; border-radius: 4px;
      color: #c9a84c; text-decoration: none; font-family: system-ui, sans-serif;
      font-size: 13px; transition: background 0.2s; }
    #room-hud .back-link:hover { background: rgba(201,168,76,0.2); }

    /* A/B toggle pill — top-right corner. Lets you flip between
       the primitive composition (cs-bar.html) and this Blender GLB
       version (cs-bar-blender.html) without going back to the mall. */
    #ab-toggle {
      position: fixed; top: 16px; right: 16px; z-index: 100;
      background: rgba(10,10,15,0.9); border: 1px solid #c9a84c;
      border-radius: 20px; padding: 4px; display: flex; gap: 2px;
      font-family: system-ui, sans-serif; font-size: 12px;
    }
    #ab-toggle a {
      color: #c9a84c; text-decoration: none; padding: 6px 14px;
      border-radius: 16px; transition: background 0.2s;
    }
    #ab-toggle a.active { background: #c9a84c; color: #0a0805; font-weight: 600; }
    #ab-toggle a:not(.active):hover { background: rgba(201,168,76,0.15); }
    #ab-toggle .label { color: #6a5a3a; padding: 6px 8px 6px 12px; font-size: 10px;
      letter-spacing: 0.1em; text-transform: uppercase; }

    #loading-veil { position: fixed; inset: 0; background: #0a0805; z-index: 9999;
      display: flex; align-items: center; justify-content: center; color: #c9a84c;
      font-family: system-ui, sans-serif; font-size: 14px; letter-spacing: 0.2em;
      text-transform: uppercase; transition: opacity 0.6s ease; }
    #loading-veil.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

  <div id="loading-veil">Entering the bar (Blender)…</div>

  <div id="room-hud">
    <div class="room-title">Cocktail Bar</div>
    <div class="room-tagline">Liquid Artistry, Reimagined · Blender Hero Scene</div>
    <a href="index.html" class="back-link">← Back to Mall</a>
  </div>

  <!-- A/B toggle: switch between primitive composition and Blender GLB -->
  <div id="ab-toggle">
    <span class="label">Version</span>
    <a href="cs-bar.html">Primitive</a>
    <a href="cs-bar-blender.html" class="active">Blender</a>
  </div>

  <a-scene
    id="room-scene"
    renderer="antialias: true; colorManagement: true"
    background="color: #0a0604"
    cursor="rayOrigin: mouse"
    loading-screen="enabled: false"
    vr-mode-ui="enabled: false">
  </a-scene>

  <script>
    // ═══════════════════════════════════════════════════════════
    // COCKTAIL BAR — BLENDER HERO SCENE VARIANT
    //
    // Companion to cs-bar.html. Loads cs-bar.glb (542 KB Meshopt-
    // compressed) as a single hero entity centered in the room.
    // The GLB was built in Blender via MCP and contains:
    //   - Bar counter + 8 stools + back-bar with bottles + TVs
    //   - Suspended brass-rod chandelier (the hero piece)
    //   - Chesterfield seating cluster (2 sofas, 2 red velvet chairs)
    //   - Coffee table + rug + side seating cluster
    //
    // The GLB has NO walls/floor/ceiling — CSRoom.boot() supplies
    // those procedurally so the room shell stays consistent with
    // every other CS room.
    //
    // ROOM: 11m wide × 8m deep × 3.6m tall
    //   Slightly deeper than cs-bar.html's 11×6 to give the
    //   Chesterfield seating cluster (which extends from the bar
    //   out to ~3m forward) breathing room before the south wall.
    //
    // COMPOSITION ORDER
    //   1. Architectural trim (wainscoting, baseboard, crown) —
    //      kept from cs-bar.html for consistent room frame
    //   2. Picture frames on side walls — atmospheric continuity
    //   (No bar / bottles / stools / pendants — those come from GLB)
    // ═══════════════════════════════════════════════════════════

    CSRoom.boot({
      id: 'bar-blender',
      name: 'Cocktail Bar',
      tagline: 'Liquid Artistry, Reimagined',

      width: 11,
      depth: 8,
      height: 3.6,

      // Walnut + brass + warm amber palette — same as cs-bar.html
      // so the architectural frame reads identically and the only
      // visual difference is the furniture/lighting in the middle.
      theme: {
        wall:    '#1a1410',
        floor:   '#0c0805',
        ceiling: '#070504',
        accent:  '#c9a84c',
        ambient: '#3a2614',
      },

      composition: [
        // ─── ARCHITECTURAL DETAILS ──────────────────────────────
        // Walnut wainscoting with brass chair-rail on 3 walls
        // (skip south where the doorway is).
        {
          type: 'wainscoting',
          height: 1.05,
          walls: ['north', 'east', 'west'],
          color: '#241810',
          stripeColor: '#c9a84c',
        },
        // Crown + baseboard for full architectural framing
        { type: 'crownMolding', height: 0.18, color: '#c9a84c' },
        { type: 'baseboard',    height: 0.12, color: '#c9a84c' },

        // ─── ART ON SIDE WALLS ──────────────────────────────────
        { type: 'pictureFrames', wall: 'east', count: 3, y: 1.95,
          frameWidth: 0.7, frameHeight: 0.95, length: 4.5 },
        { type: 'pictureFrames', wall: 'west', count: 3, y: 1.95,
          frameWidth: 0.7, frameHeight: 0.95, length: 4.5 },

        // ─── HERO GLB LOADS VIA window.CS_ROOM_PROPS['bar-blender'] ─
        // See js/cs-room-props.js for the prop entry. The boot
        // loader picks it up automatically based on cfg.id.
      ],
    });

    document.querySelector('a-scene').addEventListener('loaded', () => {
      setTimeout(() => {
        document.getElementById('loading-veil').classList.add('hidden');
      }, 800);
    });
  </script>
</body>
</html>
