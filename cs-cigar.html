<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cigar Lounge — Café Sativa</title>
  <meta name="description" content="Modern luxury — emerald banquettes, walk-in humidor, statement chandelier. Café Sativa's cigar lounge at the Tru Skool Mall.">

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
  <script src="js/gltf-extensions.js"></script>
  <script src="js/mall-nav.js"></script>
  <script src="js/cs-room-decor.js"></script>
  <script src="js/cs-room-props.js"></script>
  <script src="js/cs-room-boot.js"></script>
  <script src="js/cafe-sativa-props.js"></script>

  <link rel="stylesheet" href="css/ui.css">

  <style>
    #room-hud { position: fixed; top: 16px; left: 16px; z-index: 100;
      color: #c9a84c; font-family: 'Cinzel', 'Georgia', serif; pointer-events: auto; }
    #room-hud .room-title { font-size: 22px; font-weight: 700; letter-spacing: 0.05em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6); }
    #room-hud .room-tagline { font-size: 13px; font-weight: 400; font-style: italic;
      opacity: 0.85; margin-top: 2px; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }
    #room-hud .back-link { display: inline-block; margin-top: 10px; padding: 6px 14px;
      background: rgba(10,10,15,0.8); border: 1px solid #c9a84c; border-radius: 4px;
      color: #c9a84c; text-decoration: none; font-family: system-ui, sans-serif;
      font-size: 13px; transition: background 0.2s; }
    #room-hud .back-link:hover { background: rgba(201,168,76,0.2); }
    #loading-veil { position: fixed; inset: 0; background: #0a0604; z-index: 9999;
      display: flex; align-items: center; justify-content: center; color: #c9a84c;
      font-family: system-ui, sans-serif; font-size: 14px; letter-spacing: 0.2em;
      text-transform: uppercase; transition: opacity 0.6s ease; }
    #loading-veil.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

  <div id="loading-veil">Entering the cigar lounge…</div>

  <div id="room-hud">
    <div class="room-title">Cigar Lounge</div>
    <div class="room-tagline">Modern Luxury · Cigars · Conversation</div>
    <a href="index.html#cafe-sativa-foyer" class="back-link">← Back to Café Sativa</a>
  </div>

  <a-scene
    id="room-scene"
    renderer="antialias: true; colorManagement: true"
    background="color: #060403"
    cursor="rayOrigin: mouse"
    loading-screen="enabled: false"
    vr-mode-ui="enabled: false">
  </a-scene>

  <script>
    // ═══════════════════════════════════════════════════════════
    // CIGAR LOUNGE v4 — Hybrid (Meshy GLBs + primitive shell)
    //
    // After v3 (all primitives) read as flat blocky benches and
    // a dark rectangle for the humidor, we generated 3 fresh
    // GLBs from Meshy targeted at the actual Eight Lounge
    // visual language:
    //
    //   cigar-banquette-emerald.glb    — curved tufted banquette
    //                                    with diamond stitching,
    //                                    brass nailheads, walnut
    //                                    base. Seats ~6 per piece.
    //   cigar-walk-in-humidor.glb      — glass-enclosed walk-in
    //                                    humidor ROOM (not a flat
    //                                    cabinet). Brass-framed
    //                                    glass walls, internal
    //                                    cedar shelves with cigar
    //                                    boxes, brass-handled door,
    //                                    amber LED glow inside.
    //   cigar-statement-chandelier.glb — horizontal linear ceiling
    //                                    fixture, brass crossbar
    //                                    with 8 amber-glass cylinder
    //                                    pendants at varied heights.
    //
    // We KEEP from v3:
    //   - Architectural shell (wainscoting, crown, baseboard)
    //   - Coffered ceiling with brass strips
    //   - Marble cocktail tables (in front of banquettes)
    //   - Wall sconces (no big shades, no scale issues)
    //   - Door-only south-wall exit
    //
    // We REPLACE with GLBs:
    //   - Long flat 'banquette' primitives → curved tufted banquette
    //     GLBs (one east wall, one west wall)
    //   - 'glassHumidor' primitive (flat dark rectangle) → walk-in
    //     humidor GLB on the north wall as architectural centerpiece
    //   - (no v3 ceiling fixture) → statement chandelier GLB centered
    //
    // We ADD a third intimate seating cluster in the SW corner using
    // the EXISTING cigar-armchair-oxblood.glb and cigar-side-table-
    // walnut.glb (already on disk, just unused since v3) — gives the
    // room three distinct seating zones for varied patron experiences.
    //
    // ROOM: 12m × 8m × 3.6m (same as v3).
    // EXIT: south, door-only — inherited from cs-room-boot defaults.
    // ═══════════════════════════════════════════════════════════

    CSRoom.boot({
      id: 'cigar',
      name: 'Cigar Lounge',
      tagline: 'Modern Luxury · Cigars · Conversation',

      width: 12,
      depth: 8,
      height: 3.6,

      theme: {
        wall:    '#1a1208',   // deep dark walnut
        floor:   '#0a0604',   // near-black hardwood
        ceiling: '#070504',   // smoky black (mostly hidden by coffer)
        accent:  '#c9a84c',   // brass
        ambient: '#2a1810',   // very low warm ambient
      },

      composition: [
        // ─── ARCHITECTURAL SHELL ────────────────────────────────
        {
          type: 'wainscoting',
          height: 1.00,
          walls: ['north', 'east', 'west'],
          color: '#241810',
          stripeColor: '#c9a84c',
        },
        { type: 'crownMolding', height: 0.18, color: '#c9a84c' },
        { type: 'baseboard',    height: 0.10, color: '#c9a84c' },

        // ─── COFFERED CEILING ───────────────────────────────────
        {
          type: 'cofferedCeiling',
          cols: 3,
          rows: 4,
          stripWidth: 0.08,
          recessDepth: 0.12,
          stripColor: '#c9a84c',
          panelColor: '#0a0604',
        },

        // ─── HERO #1: WALK-IN HUMIDOR (centerpiece) ─────────────
        // Sits flush against the north wall, centered on x=0.
        // Auto-snap-to-floor handles the y position. We rotY=0 so
        // the door faces SOUTH (toward the player as they enter).
        // Scale 1.0 — Meshy GLBs at v5 are typically 1m scale-ratio.
        {
          type: 'heroGLB',
          src: 'assets/models/props/cigar-walk-in-humidor.glb',
          pos: '0 0 -3.4',
          rot: '0 0 0',
          scale: '1.0 1.0 1.0',
          id: 'walk-in-humidor',
        },

        // ─── HERO #2: BANQUETTE WEST ────────────────────────────
        // Curved tufted emerald banquette flush against west wall.
        // rotY=90 turns its back to face -X (the wall) so seat
        // faces +X (into the room).
        {
          type: 'heroGLB',
          src: 'assets/models/props/cigar-banquette-emerald.glb',
          pos: '-5.5 0 -0.2',
          rot: '0 90 0',
          scale: '1.0 1.0 1.0',
          id: 'banquette-west',
        },

        // ─── HERO #3: BANQUETTE EAST ────────────────────────────
        // Mirrored on the east wall. rotY=-90 turns back to +X (wall),
        // seat faces -X (into the room).
        {
          type: 'heroGLB',
          src: 'assets/models/props/cigar-banquette-emerald.glb',
          pos: '5.5 0 -0.2',
          rot: '0 -90 0',
          scale: '1.0 1.0 1.0',
          id: 'banquette-east',
        },

        // ─── HERO #4: STATEMENT CHANDELIER ──────────────────────
        // Horizontal fixture mounted at ceiling height, centered.
        // Snap is OFF because we want the chandelier hanging from
        // the ceiling, not snapped to floor.
        {
          type: 'heroGLB',
          src: 'assets/models/props/cigar-statement-chandelier.glb',
          pos: '0 3.0 0',
          rot: '0 0 0',
          scale: '1.0 1.0 1.0',
          snap: false,
          id: 'chandelier',
        },

        // ─── MARBLE COCKTAIL TABLES (in front of banquettes) ────
        // Banquettes are at x=±5.5, ~0.7m deep, so seat fronts are at
        // x=±4.8 facing inward. Place tables ~0.7m in from the
        // banquette seat front so a patron can rest a drink without
        // leaning forward.
        // West side (in front of west banquette):
        { type: 'marbleTable', x: -4.0, z: -2.2, radius: 0.32, height: 0.52 },
        { type: 'marbleTable', x: -4.0, z: -0.8, radius: 0.32, height: 0.52 },
        { type: 'marbleTable', x: -4.0, z:  0.6, radius: 0.32, height: 0.52 },
        { type: 'marbleTable', x: -4.0, z:  2.0, radius: 0.32, height: 0.52 },
        // East side:
        { type: 'marbleTable', x:  4.0, z: -2.2, radius: 0.32, height: 0.52 },
        { type: 'marbleTable', x:  4.0, z: -0.8, radius: 0.32, height: 0.52 },
        { type: 'marbleTable', x:  4.0, z:  0.6, radius: 0.32, height: 0.52 },
        { type: 'marbleTable', x:  4.0, z:  2.0, radius: 0.32, height: 0.52 },

        // ─── INTIMATE CLUSTER (SW corner, existing GLBs) ─────────
        // Two oxblood armchairs angled toward each other across a
        // walnut side table. Center of cluster around (-1, 0, 2.2)
        // — south central area in front of the banquettes' middle,
        // visible from the entry but offset enough to feel private.
        {
          type: 'heroGLB',
          src: 'assets/models/props/cigar-armchair-oxblood.glb',
          pos: '-1.5 0 2.3',
          rot: '0 30 0',
          scale: '1.0 1.0 1.0',
          id: 'armchair-a',
        },
        {
          type: 'heroGLB',
          src: 'assets/models/props/cigar-armchair-oxblood.glb',
          pos: '1.5 0 2.3',
          rot: '0 -30 0',
          scale: '1.0 1.0 1.0',
          id: 'armchair-b',
        },
        {
          type: 'heroGLB',
          src: 'assets/models/props/cigar-side-table-walnut.glb',
          pos: '0 0 2.5',
          rot: '0 0 0',
          scale: '1.0 1.0 1.0',
          id: 'cluster-table',
        },

        // ─── WALL SCONCES ───────────────────────────────────────
        // 3 per long wall, ~2.3m up — between banquette top-rail and
        // ceiling. Each casts a warm point light over the booth.
        { type: 'wallSconce', wall: 'west', z: -2.2, y: 2.3 },
        { type: 'wallSconce', wall: 'west', z:  0,   y: 2.3 },
        { type: 'wallSconce', wall: 'west', z:  2.2, y: 2.3 },
        { type: 'wallSconce', wall: 'east', z: -2.2, y: 2.3 },
        { type: 'wallSconce', wall: 'east', z:  0,   y: 2.3 },
        { type: 'wallSconce', wall: 'east', z:  2.2, y: 2.3 },
      ],
    });

    document.querySelector('a-scene').addEventListener('loaded', () => {
      setTimeout(() => {
        document.getElementById('loading-veil').classList.add('hidden');
      }, 800);
    });
  </script>
</body>
</html>
