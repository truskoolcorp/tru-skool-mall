<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cigar Lounge — Café Sativa</title>
  <meta name="description" content="Modern luxury — emerald banquettes, brass-framed humidor, marble tables. Café Sativa's cigar lounge at the Tru Skool Mall.">

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
  <script src="js/gltf-extensions.js"></script>
  <script src="js/mall-nav.js"></script>
  <script src="js/cs-room-decor.js"></script>
  <script src="js/cs-room-props.js"></script>
  <script src="js/cs-room-boot.js"></script>
  <script src="js/cafe-sativa-props.js"></script>

  <link rel="stylesheet" href="css/ui.css">

  <style>
    #room-hud { position: fixed; top: 16px; left: 16px; z-index: 100;
      color: #c9a84c; font-family: 'Cinzel', 'Georgia', serif; pointer-events: auto; }
    #room-hud .room-title { font-size: 22px; font-weight: 700; letter-spacing: 0.05em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6); }
    #room-hud .room-tagline { font-size: 13px; font-weight: 400; font-style: italic;
      opacity: 0.85; margin-top: 2px; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }
    #room-hud .back-link { display: inline-block; margin-top: 10px; padding: 6px 14px;
      background: rgba(10,10,15,0.8); border: 1px solid #c9a84c; border-radius: 4px;
      color: #c9a84c; text-decoration: none; font-family: system-ui, sans-serif;
      font-size: 13px; transition: background 0.2s; }
    #room-hud .back-link:hover { background: rgba(201,168,76,0.2); }
    #loading-veil { position: fixed; inset: 0; background: #0a0604; z-index: 9999;
      display: flex; align-items: center; justify-content: center; color: #c9a84c;
      font-family: system-ui, sans-serif; font-size: 14px; letter-spacing: 0.2em;
      text-transform: uppercase; transition: opacity 0.6s ease; }
    #loading-veil.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

  <div id="loading-veil">Entering the cigar lounge…</div>

  <div id="room-hud">
    <div class="room-title">Cigar Lounge</div>
    <div class="room-tagline">Modern Luxury · Cigars · Conversation</div>
    <a href="index.html#cafe-sativa-foyer" class="back-link">← Back to Café Sativa</a>
  </div>

  <a-scene
    id="room-scene"
    renderer="antialias: true; colorManagement: true"
    background="color: #060403"
    cursor="rayOrigin: mouse"
    loading-screen="enabled: false"
    vr-mode-ui="enabled: false">
  </a-scene>

  <script>
    // ═══════════════════════════════════════════════════════════
    // CIGAR LOUNGE v3 — Eight Lounge inspired
    //
    // Reference: Eight Cigar Lounge at Resorts World Las Vegas.
    // Key aesthetic shifts from v1/v2 (Victorian library/wingbacks):
    //   - Long banquettes along walls (not isolated chair clusters)
    //   - Emerald velvet (not oxblood) — distinctive, modern
    //   - Glass humidor with internal warm glow (not wood-shelf boxes)
    //   - Wall sconces + ceiling cofferes (NOT standing lamps)
    //   - Marble cocktail tables (not mahogany)
    //   - Coffered ceiling with brass strips for architectural depth
    //
    // ROOM: 12m × 8m × 3.6m (longer/taller for the ceiling effect).
    //
    // LAYOUT (top-down, north at top):
    //
    //       ┌──────GLASS HUMIDOR (north wall)──────────┐
    //       │                                          │
    //       │  ┌────────────────────────────┐          │
    //       │  │    BANQUETTE (west wall)   │          │
    //       │  │ table  table  table  table │          │
    //       │  │                            │          │
    //       │  │            (open floor)    │          │
    //       │  │                            │          │
    //       │  │ table  table  table  table │          │
    //       │  │   BANQUETTE (east wall)    │          │
    //       │  └────────────────────────────┘          │
    //       │                                          │
    //       └────────────[door (south)]────────────────┘
    //
    // CAPACITY:
    //   - West banquette: ~5m long, seats 8
    //   - East banquette: ~5m long, seats 8
    //   - Total: ~16 patrons + standing room in the open center
    //
    // LIGHTING (no standing lamps):
    //   - 6 wall sconces (3 per long wall, between banquettes &
    //     ceiling) — warm pools above each booth
    //   - Backlit humidor glow on north wall (emissive cabinet back)
    //   - Coffered ceiling with brass strips reads as moody upper
    //     architectural detail
    //
    // EXIT: south wall, door-only (cs-boundary clamps everywhere
    // else on south wall).
    // ═══════════════════════════════════════════════════════════

    CSRoom.boot({
      id: 'cigar',
      name: 'Cigar Lounge',
      tagline: 'Modern Luxury · Cigars · Conversation',

      width: 12,
      depth: 8,
      height: 3.6,

      // Eight Lounge palette: deep walnut + emerald accents + brass
      theme: {
        wall:    '#1a1208',   // deep dark walnut
        floor:   '#0a0604',   // near-black hardwood
        ceiling: '#070504',   // smoky black (mostly hidden by coffer)
        accent:  '#c9a84c',   // brass
        ambient: '#2a1810',   // very low warm ambient
      },

      composition: [
        // ─── ARCHITECTURAL DETAILS ──────────────────────────────
        // Walnut wainscoting up to 1.0m on N/E/W walls. Lower than
        // v2 (1.20m) so the banquette backs are the dominant lower-
        // wall element, with wainscoting just framing them.
        {
          type: 'wainscoting',
          height: 1.00,
          walls: ['north', 'east', 'west'],
          color: '#241810',
          stripeColor: '#c9a84c',
        },
        { type: 'crownMolding', height: 0.18, color: '#c9a84c' },
        { type: 'baseboard',    height: 0.10, color: '#c9a84c' },

        // ─── COFFERED CEILING ───────────────────────────────────
        // 3 cols × 4 rows of recessed panels with brass strips
        // between. Adds significant architectural depth — looks
        // like a real luxury venue ceiling.
        {
          type: 'cofferedCeiling',
          cols: 3,
          rows: 4,
          stripWidth: 0.08,
          recessDepth: 0.12,
          stripColor: '#c9a84c',
          panelColor: '#0a0604',
        },

        // ─── GLASS HUMIDOR (NORTH WALL) ─────────────────────────
        // The visual centerpiece. Brass-framed cabinet, cigar boxes
        // on 4 internal shelves, warm emissive interior glow.
        // Player walking in from the south sees this lit cabinet
        // glowing warmly across the room.
        {
          type: 'glassHumidor',
          wall: 'north',
          length: 7.0,
          height: 2.4,
          startY: 0.6,
          shelves: 4,
          perShelf: 9,         // 36 boxes total
          frameColor: '#c9a84c',
          interiorColor: '#1a0e08',
          glowColor: '#3a2010',
        },

        // ─── BANQUETTES ─────────────────────────────────────────
        // Two long emerald velvet benches against east and west
        // walls. Each runs ~5m, seats ~8 patrons.
        {
          type: 'banquette',
          wall: 'west',
          length: 5.5,
          offsetAlong: 0,        // centered along the wall
          color: '#1a3a2a',      // emerald velvet (dark forest tone)
          baseColor: '#1a0e08',
          studColor: '#c9a84c',
        },
        {
          type: 'banquette',
          wall: 'east',
          length: 5.5,
          offsetAlong: 0,
          color: '#1a3a2a',
          baseColor: '#1a0e08',
          studColor: '#c9a84c',
        },

        // ─── MARBLE COCKTAIL TABLES (in front of banquettes) ────
        // 4 tables along each banquette, spaced evenly. Cream
        // marble tops on slim brass posts.
        // West side (x ≈ -4.0, in front of west banquette):
        { type: 'marbleTable', x: -4.0, z: -2.0, radius: 0.32, height: 0.52 },
        { type: 'marbleTable', x: -4.0, z: -0.65, radius: 0.32, height: 0.52 },
        { type: 'marbleTable', x: -4.0, z:  0.65, radius: 0.32, height: 0.52 },
        { type: 'marbleTable', x: -4.0, z:  2.0, radius: 0.32, height: 0.52 },
        // East side (x ≈ +4.0):
        { type: 'marbleTable', x:  4.0, z: -2.0, radius: 0.32, height: 0.52 },
        { type: 'marbleTable', x:  4.0, z: -0.65, radius: 0.32, height: 0.52 },
        { type: 'marbleTable', x:  4.0, z:  0.65, radius: 0.32, height: 0.52 },
        { type: 'marbleTable', x:  4.0, z:  2.0, radius: 0.32, height: 0.52 },

        // ─── WALL SCONCES ───────────────────────────────────────
        // 3 per long wall, ~2.2m up, between banquette top-rail and
        // ceiling. Each casts a warm point light over the banquette
        // patrons. NO standing lamps anywhere — architectural light
        // only, like Eight.
        { type: 'wallSconce', wall: 'west', z: -2.2, y: 2.3 },
        { type: 'wallSconce', wall: 'west', z:  0,   y: 2.3 },
        { type: 'wallSconce', wall: 'west', z:  2.2, y: 2.3 },
        { type: 'wallSconce', wall: 'east', z: -2.2, y: 2.3 },
        { type: 'wallSconce', wall: 'east', z:  0,   y: 2.3 },
        { type: 'wallSconce', wall: 'east', z:  2.2, y: 2.3 },
      ],
    });

    document.querySelector('a-scene').addEventListener('loaded', () => {
      setTimeout(() => {
        document.getElementById('loading-veil').classList.add('hidden');
      }, 800);
    });
  </script>
</body>
</html>
