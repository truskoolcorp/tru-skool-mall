<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cigar Lounge — Café Sativa</title>
  <meta name="description" content="Oxblood leather, mahogany, and aged paper — Café Sativa's VIP cigar lounge at the Tru Skool Mall.">

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
  <script src="js/gltf-extensions.js"></script>
  <script src="js/cs-room-props.js"></script>
  <script src="js/cs-room-boot.js"></script>
  <script src="js/cafe-sativa-props.js"></script>

  <link rel="stylesheet" href="css/ui.css">

  <style>
    #room-hud { position: fixed; top: 16px; left: 16px; z-index: 100;
      color: #b85450; font-family: 'Cinzel', 'Georgia', serif; pointer-events: auto; }
    #room-hud .room-title { font-size: 22px; font-weight: 700; letter-spacing: 0.05em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6); }
    #room-hud .room-tagline { font-size: 13px; font-weight: 400; font-style: italic;
      opacity: 0.85; margin-top: 2px; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }
    #room-hud .back-link { display: inline-block; margin-top: 10px; padding: 6px 14px;
      background: rgba(10,10,15,0.8); border: 1px solid #b85450; border-radius: 4px;
      color: #b85450; text-decoration: none; font-family: system-ui, sans-serif;
      font-size: 13px; transition: background 0.2s; }
    #room-hud .back-link:hover { background: rgba(184,84,80,0.2); }
    #loading-veil { position: fixed; inset: 0; background: #0a0503; z-index: 9999;
      display: flex; align-items: center; justify-content: center; color: #b85450;
      font-family: system-ui, sans-serif; font-size: 14px; letter-spacing: 0.2em;
      text-transform: uppercase; transition: opacity 0.6s ease; }
    #loading-veil.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

  <div id="loading-veil">Entering the cigar lounge…</div>

  <div id="room-hud">
    <div class="room-title">Cigar Lounge</div>
    <div class="room-tagline">Reserved for Refined Gentlemen</div>
    <a href="index.html" class="back-link">← Back to Mall</a>
  </div>

  <a-scene
    id="room-scene"
    renderer="antialias: true; colorManagement: true"
    background="color: #1a0a08"
    cursor="rayOrigin: mouse"
    loading-screen="enabled: false"
    vr-mode-ui="enabled: false">
  </a-scene>

  <script>
    CSRoom.boot({
      id: 'cigar',
      name: 'Cigar Lounge',
      tagline: 'Reserved for Refined Gentlemen',

      // Intimate VIP — smaller than the bar, lower ceiling for the
      // contained "smoke clings to the ceiling" feel.
      width: 5,
      depth: 4,
      height: 3.0,

      // Cigar lounge theme: oxblood + mahogany + aged paper
      theme: {
        wall:    '#1a0a08',   // deep oxblood
        floor:   '#100604',   // near-black mahogany
        ceiling: '#080302',   // smoky charcoal
        accent:  '#b85450',   // muted oxblood-red
        ambient: '#3a1812',   // mahogany ambient
      },
    });

    document.querySelector('a-scene').addEventListener('loaded', () => {
      setTimeout(() => {
        document.getElementById('loading-veil').classList.add('hidden');
      }, 800);
    });
  </script>
</body>
</html>
