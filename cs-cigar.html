<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cigar Lounge — Café Sativa</title>
  <meta name="description" content="A walnut-and-leather hideaway. Tufted wingbacks, rare boxes, library shelves — Café Sativa's cigar lounge at the Tru Skool Mall.">

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
  <script src="js/gltf-extensions.js"></script>
  <script src="js/mall-nav.js"></script>
  <script src="js/cs-room-decor.js"></script>
  <script src="js/cs-room-props.js"></script>
  <script src="js/cs-room-boot.js"></script>
  <script src="js/cafe-sativa-props.js"></script>

  <link rel="stylesheet" href="css/ui.css">

  <style>
    #room-hud { position: fixed; top: 16px; left: 16px; z-index: 100;
      color: #c9a84c; font-family: 'Cinzel', 'Georgia', serif; pointer-events: auto; }
    #room-hud .room-title { font-size: 22px; font-weight: 700; letter-spacing: 0.05em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6); }
    #room-hud .room-tagline { font-size: 13px; font-weight: 400; font-style: italic;
      opacity: 0.85; margin-top: 2px; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }
    #room-hud .back-link { display: inline-block; margin-top: 10px; padding: 6px 14px;
      background: rgba(10,10,15,0.8); border: 1px solid #c9a84c; border-radius: 4px;
      color: #c9a84c; text-decoration: none; font-family: system-ui, sans-serif;
      font-size: 13px; transition: background 0.2s; }
    #room-hud .back-link:hover { background: rgba(201,168,76,0.2); }
    #loading-veil { position: fixed; inset: 0; background: #0a0604; z-index: 9999;
      display: flex; align-items: center; justify-content: center; color: #c9a84c;
      font-family: system-ui, sans-serif; font-size: 14px; letter-spacing: 0.2em;
      text-transform: uppercase; transition: opacity 0.6s ease; }
    #loading-veil.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

  <div id="loading-veil">Entering the cigar lounge…</div>

  <div id="room-hud">
    <div class="room-title">Cigar Lounge</div>
    <div class="room-tagline">A Walnut-and-Leather Hideaway</div>
    <a href="index.html#cafe-sativa-foyer" class="back-link">← Back to Café Sativa</a>
  </div>

  <a-scene
    id="room-scene"
    renderer="antialias: true; colorManagement: true"
    background="color: #0a0604"
    cursor="rayOrigin: mouse"
    loading-screen="enabled: false"
    vr-mode-ui="enabled: false">
  </a-scene>

  <script>
    // ═══════════════════════════════════════════════════════════
    // CIGAR LOUNGE v2 — Composition with multiple seating clusters
    //
    // ROOM: 11m × 8m × 3.4m (bigger than v1's 9×7×3.2 — needs the
    //   extra width to host two seating clusters + circulation).
    //
    // LAYOUT (top-down view, north at top):
    //
    //          ┌───────────HUMIDOR (north wall)──────────┐
    //          │                                          │
    //          │   [chair][table][chair]                  │
    //          │       (cluster A)                        │
    //          │                          [chair]         │
    //          │                          [table]         │
    //          │                          [chair]         │
    //          │                          (cluster B)     │
    //          │ [LIBRARY (west)]                         │
    //          │                          [art (east)]   │
    //          └────────────[door (south)]────────────────┘
    //
    // CLUSTER A (north side): 2 chairs facing each other across a
    //   small table, lampshade above. Closer to the humidor wall —
    //   reading-and-pairing seats.
    //
    // CLUSTER B (south-east): 2 more chairs facing each other with
    //   their own table and lamp. More private — conversation seats.
    //
    // 4 chairs + 2 tables + 2 lamps = up to 4 patrons comfortably,
    // 6+ if friends share a chair-arm or stand. Library wall on west
    // is a third place to linger.
    //
    // Humidor wall raised: startY 1.95 (was 1.55). Chair backs reach
    // y=1.60. Humidor now sits clearly above them, visible from the
    // entire room.
    //
    // EXIT: south wall, door-only (cs-boundary now clamps the rest
    // of the south wall — no more accidental walk-throughs).
    // ═══════════════════════════════════════════════════════════

    CSRoom.boot({
      id: 'cigar',
      name: 'Cigar Lounge',
      tagline: 'A Walnut-and-Leather Hideaway',

      width: 11,
      depth: 8,
      height: 3.4,

      theme: {
        wall:    '#1f1410',
        floor:   '#0a0604',
        ceiling: '#070504',
        accent:  '#c9a84c',
        ambient: '#3a1f12',
      },

      composition: [
        // ─── ARCHITECTURAL DETAILS ──────────────────────────────
        {
          type: 'wainscoting',
          height: 1.20,
          walls: ['north', 'east', 'west'],
          color: '#2a1814',
          stripeColor: '#c9a84c',
        },
        { type: 'crownMolding', height: 0.18, color: '#c9a84c' },
        { type: 'baseboard',    height: 0.12, color: '#c9a84c' },

        // ─── ART ON EAST WALL ───────────────────────────────────
        {
          type: 'pictureFrames',
          wall: 'east',
          count: 4,
          y: 2.10,
          frameWidth: 0.65,
          frameHeight: 0.85,
          length: 5.5,
          colors: ['#3a2818', '#4a3020', '#3e2818', '#4a2818'],
        },

        // ─── HUMIDOR WALL (NORTH) ───────────────────────────────
        // Raised to startY 1.95 so it clears the chair-back tops
        // (chairs are 1.60m tall; humidor was previously hidden
        // behind them). Now visible from anywhere in the room.
        // 4 shelves × 8 boxes = 32 cigar boxes.
        {
          type: 'humidorWall',
          wall: 'north',
          shelves: 4,
          perShelf: 8,
          length: 7.0,
          startY: 1.95,
          shelfGap: 0.32,
          shelfColor: '#2a1a0e',
        },

        // ─── BOOKSHELF (WEST WALL) ──────────────────────────────
        {
          type: 'bookshelf',
          wall: 'west',
          shelves: 5,
          perShelf: 16,
          length: 6.0,
          startY: 0.30,
          shelfGap: 0.40,
          shelfColor: '#1f1208',
        },

        // ═══ CLUSTER A — north reading nook ════════════════════
        // 2 chairs facing each other (east-west axis) just south of
        // humidor. Coffee table between, standing lamp behind west
        // chair. Player walking from south sees this cluster first.
        {
          type: 'floorRug',
          x: -1.5, z: -1.8,
          width: 3.4, depth: 2.2,
          color: '#3a1818',
          trimColor: '#c9a84c',
          trimWidth: 0.10,
        },
        // West chair faces east
        {
          type: 'wingbackChair',
          x: -2.4, z: -1.8,
          rotY: 90,
          color: '#5a1a1a',
          woodColor: '#1a0e08',
        },
        // East chair faces west
        {
          type: 'wingbackChair',
          x: -0.6, z: -1.8,
          rotY: -90,
          color: '#5a1a1a',
          woodColor: '#1a0e08',
        },
        // Coffee table centered between them
        {
          type: 'coffeeTable',
          x: -1.5, z: -1.8,
          shape: 'round',
          radius: 0.40,
          height: 0.45,
          topColor: '#1a0e08',
          baseColor: '#c9a84c',
        },
        // Standing lamp north of west chair
        {
          type: 'standingLamp',
          x: -2.4, z: -2.7,
          height: 1.6,
          shadeColor: '#3a1f12',
          lightIntensity: 4.5,
        },

        // ═══ CLUSTER B — south conversation nook ═══════════════
        // 2 more chairs facing each other (north-south axis) on the
        // east side of the room. Coffee table + lamp.
        {
          type: 'floorRug',
          x: 2.5, z: 1.0,
          width: 2.4, depth: 3.4,
          color: '#3a1818',
          trimColor: '#c9a84c',
          trimWidth: 0.10,
        },
        // North chair faces south
        {
          type: 'wingbackChair',
          x: 2.5, z: -0.1,
          rotY: 180,
          color: '#5a1a1a',
          woodColor: '#1a0e08',
        },
        // South chair faces north
        {
          type: 'wingbackChair',
          x: 2.5, z: 2.1,
          rotY: 0,
          color: '#5a1a1a',
          woodColor: '#1a0e08',
        },
        // Coffee table centered between them
        {
          type: 'coffeeTable',
          x: 2.5, z: 1.0,
          shape: 'round',
          radius: 0.40,
          height: 0.45,
          topColor: '#1a0e08',
          baseColor: '#c9a84c',
        },
        // Standing lamp east of cluster
        {
          type: 'standingLamp',
          x: 3.6, z: 1.0,
          height: 1.6,
          shadeColor: '#3a1f12',
          lightIntensity: 4.5,
        },
      ],
    });

    document.querySelector('a-scene').addEventListener('loaded', () => {
      setTimeout(() => {
        document.getElementById('loading-veil').classList.add('hidden');
      }, 800);
    });
  </script>
</body>
</html>
