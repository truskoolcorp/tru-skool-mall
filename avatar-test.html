<!DOCTYPE html>
<html>
<head>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
</head>
<body>
<a-scene>
  <a-entity light="type: ambient; intensity: 0.8"></a-entity>
  <a-entity light="type: directional; intensity: 0.6" position="1 3 2"></a-entity>
  <a-plane rotation="-90 0 0" width="20" height="20" color="#333"></a-plane>

  <!-- Test 1: Scale 0.01 (current approach) -->
  <a-entity id="test1"
    gltf-model="https://mall.truskool.net/assets/models/laviche.glb"
    position="-3 0 -5"
    scale="0.01 0.01 0.01"
    animation-mixer="loop: repeat">
  </a-entity>

  <!-- Test 2: Scale 1 (no scaling) -->
  <a-entity id="test2"
    gltf-model="https://mall.truskool.net/assets/models/laviche.glb"
    position="3 0 -5"
    scale="1 1 1"
    animation-mixer="loop: repeat">
  </a-entity>

  <a-text value="Scale 0.01" position="-3 3 -5" align="center" color="#ff0"></a-text>
  <a-text value="Scale 1.0" position="3 3 -5" align="center" color="#0ff"></a-text>

  <a-entity camera position="0 2 2" look-controls="pointerLockEnabled: false"></a-entity>
</a-scene>
<script>
document.querySelector('a-scene').addEventListener('loaded', function() {
  ['test1', 'test2'].forEach(function(id) {
    var el = document.getElementById(id);
    el.addEventListener('model-loaded', function() {
      var mesh = el.getObject3D('mesh');
      var box = new THREE.Box3().setFromObject(mesh);
      console.log(id + ' loaded! BBox:', box.min.toArray().map(v=>v.toFixed(2)), '→', box.max.toArray().map(v=>v.toFixed(2)));
      console.log(id + ' scale:', el.getAttribute('scale'));
    });
    el.addEventListener('model-error', function(e) {
      console.error(id + ' ERROR:', e.detail);
    });
  });
});
</script>
</body>
</html>
